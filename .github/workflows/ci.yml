name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-shell:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Find and lint shell scripts
        run: |
          find . -type f \( -name "*.sh" -o -name "*.bash" -o -name ".zshrc" -o -name ".bashrc" -o -name "sketchybarrc" -o -name "skhdrc" \) \
            -not -path "./dot-claude/*" \
            -not -path "./.git/*" \
            -print0 | xargs -0 shellcheck --severity=warning || true

  lint-lua:
    name: Lint Lua Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Lua tools
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          cargo install stylua

      - name: Check Lua formatting with StyLua
        run: |
          stylua --check dot-config/nvim/ || echo "Lua formatting issues found"

  lint-yaml:
    name: Lint YAML Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -d relaxed .github/ || true

  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          fix: false
        continue-on-error: true

  validate-brewfile:
    name: Validate Brewfile
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Brewfile syntax
        run: |
          ruby -c Brewfile

  validate-makefile:
    name: Validate Makefile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Makefile syntax
        run: |
          make -n install
          make -n uninstall

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          grep -rn --include="*.sh" --include="*.zsh" --include=".zshrc" \
            -E "(password|secret|api_key|token)[\s]*=[\s]*['\"][^'\"]+['\"]" . || echo "No hardcoded secrets found"
